version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./.redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker-ingest:
    build: .
    command: celery -A tasks.celery_app worker -Q ingest -c 4 --loglevel=info
    env_file: .env
    environment:
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      DB_POOL_SIZE: "1"
      DB_MAX_OVERFLOW: "0"
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  worker-metrics:
    build: .
    command: celery -A tasks.celery_app worker -Q metrics -c 50 --loglevel=info
    env_file: .env
    environment:
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      DB_POOL_SIZE: "1"
      DB_MAX_OVERFLOW: "0"
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  worker-reduce:
    build: .
    command: celery -A tasks.celery_app worker -Q reduce -c 16 --loglevel=info
    env_file: .env
    environment:
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      DB_POOL_SIZE: "4"
      DB_MAX_OVERFLOW: "2"
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  scheduler:
    build: .
    command: celery -A tasks.celery_app beat --loglevel=info
    env_file: .env
    environment:
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
    depends_on:
      redis:
        condition: service_healthy
    restart: always
