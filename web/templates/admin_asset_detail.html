{% extends "base.html" %}
{% block title %}Admin — Asset #{{ image_id }}{% endblock %}

{% block content %}
<style>
  .cov-toggle {
    display: inline-flex; align-items: center; padding: 5px 12px;
    border: 1px solid var(--border); border-radius: 999px;
    color: var(--muted); text-decoration: none; font-size: 12px;
    background: var(--surface-2, #0d1c2e);
  }
  .cov-toggle:hover { color: var(--text); border-color: var(--accent); }
  .cov-toggle.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
  .asset-page { display: grid; grid-template-columns: minmax(0, 460px) minmax(0, 1fr); gap: 24px; align-items: start; }
  @media (max-width: 860px) { .asset-page { grid-template-columns: 1fr; } }
  .asset-preview img { width: 100%; border: 1px solid var(--border); border-radius: 10px; display: block; }
  .meta-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .meta-table th, .meta-table td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .meta-table th { color: var(--muted); font-weight: 600; width: 30%; white-space: nowrap; }
  .meta-table a { color: var(--accent); text-decoration: none; }
  .meta-table a:hover { text-decoration: underline; }
  .panel { background: var(--surface-2, #0d1c2e); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 16px; }
  .panel h3 { margin: 0 0 8px 0; font-size: 14px; }
  .prompt-box {
    width: 100%; height: 360px; resize: vertical;
    font-family: ui-monospace, monospace; font-size: 11.5px; line-height: 1.55;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 8px;
  }
  .btn-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
  .btn { cursor: pointer; padding: 6px 12px; font-size: 12px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { color: var(--loss); border-color: color-mix(in srgb, var(--loss) 40%, var(--border)); }
  .btn-warn { color: #f97316; border-color: color-mix(in srgb, #f97316 40%, var(--border)); }
  .file-input { font-size: 12px; }
  .status { font-size: 12px; color: var(--muted); }
  .status.ok { color: var(--win); }
  .status.err { color: var(--loss); }
  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    border: 1px solid var(--border); font-size: 11px; color: var(--muted);
  }
  .pill.enabled { color: var(--win); border-color: color-mix(in srgb, var(--win) 40%, var(--border)); }
  .pill.disabled { color: var(--loss); border-color: color-mix(in srgb, var(--loss) 40%, var(--border)); }
  .prompt-tabs { display: flex; gap: 6px; margin-bottom: 8px; }
  .prompt-tab {
    cursor: pointer; padding: 5px 12px; font-size: 12px; border-radius: 6px 6px 0 0;
    border: 1px solid var(--border); border-bottom: none; background: transparent;
    color: var(--muted);
  }
  .prompt-tab:hover { color: var(--text); }
  .prompt-tab.active { background: var(--bg); color: var(--accent); border-color: var(--accent); }
  .prompt-tab .pill { margin-left: 6px; padding: 1px 6px; font-size: 10px; }
  .prompt-diff-hint {
    font-size: 11px; color: var(--muted); margin-left: auto; align-self: center;
  }
  .prompt-diff-hint.differs { color: #f97316; }
  /* Variant switcher — only renders when this asset has a sibling
     (vertical ⇄ square). Hidden otherwise so single assets keep their
     original cleaner header. Spans the full width of the asset-page
     grid so it sits above both columns instead of getting jammed into
     the left preview column. */
  .variant-switcher {
    grid-column: 1 / -1;
    display: flex; gap: 6px; margin-bottom: 1rem; align-items: center;
    flex-wrap: wrap;
  }
  .variant-switcher .label {
    font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.05em; margin-right: 4px;
  }
  .variant-tab {
    padding: 5px 14px; font-size: 12px; border-radius: 999px;
    border: 1px solid var(--border); color: var(--muted);
    text-decoration: none; background: var(--surface-2, #0d1c2e);
  }
  .variant-tab:hover { color: var(--text); border-color: var(--accent); }
  .variant-tab.active {
    background: var(--accent-dim); color: var(--accent);
    border-color: var(--accent);
  }
  .variant-tab .dim { color: var(--muted); font-size: 11px; }
</style>

<nav style="display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;">
  <a href="{{ url_for('admin_pipeline') }}" class="cov-toggle">Pipeline</a>
  <a href="{{ url_for('admin_settings') }}" class="cov-toggle">Settings</a>
  <a href="{{ url_for('admin_monitor') }}" class="cov-toggle">Monitor</a>
  <a href="{{ url_for('admin_tickets') }}" class="cov-toggle">Tickets</a>
  <a href="{{ url_for('admin_assets') }}" class="cov-toggle active">AI Assets</a>
</nav>

<div style="margin-bottom:1rem;">
  <a href="{{ url_for('admin_assets') }}" style="color:var(--muted);text-decoration:none;font-size:12px;">← All assets</a>
  <h1 style="margin:6px 0 0 0;">Asset #{{ image_id }}</h1>
</div>

<div id="asset-root" class="asset-page">
  <div style="color:var(--muted);">Loading…</div>
</div>

<script>
(function () {
  const root = document.getElementById('asset-root');
  const ASSET_ID = {{ image_id|int }};

  function esc(value) {
    const div = document.createElement('div');
    div.textContent = String(value || '');
    return div.innerHTML;
  }

  function setStatus(elId, msg, kind) {
    const el = document.getElementById(elId);
    if (!el) return;
    el.textContent = msg || '';
    el.className = 'status ' + (kind || '');
  }

  function render(d) {
    const m = d.meta || {};
    const sib = d.sibling || null;
    const linkGame = m.game_url
      ? `<a href="${esc(m.game_url)}">${esc(m.matchup_text || m.game_id || '')}</a>`
      : esc(m.matchup_text || m.game_id || '—');
    const linkMetric = m.metric_url
      ? `<a href="${esc(m.metric_url)}">${esc(m.metric_name || m.metric_key)}</a>`
      : esc(m.metric_name || m.metric_key || '—');
    const linkPost = m.post_id
      ? `<a href="/admin/content/${m.post_id}">post #${m.post_id}</a>`
      : '—';
    const enabledPill = m.is_enabled ? '<span class="pill enabled">enabled</span>' : '<span class="pill disabled">disabled</span>';

    // Hero pair switcher: appears when this asset has a sibling. Tab clicks
    // navigate to the sibling's URL — one URL = one variant, no client-side
    // tab state to manage. Vertical always sits left of Square so the order
    // is stable regardless of which side you arrived on.
    const hasSibling = !!sib;
    const variantLabel = (v) => v === 'square' ? 'Square 1024×1024' : 'Vertical 1024×1536';
    const variantSwitcher = hasSibling
      ? (() => {
          const cur = m.variant === 'square' ? 'square' : 'vertical';
          const sibVariant = cur === 'square' ? 'vertical' : 'square';
          const tabSelf = `<span class="variant-tab active">${esc(variantLabel(cur))}</span>`;
          const tabSib = `<a class="variant-tab" href="/admin/assets/${sib.id}">${esc(variantLabel(sibVariant))}</a>`;
          // Always render Vertical | Square in that order regardless of cur.
          const left  = cur === 'vertical' ? tabSelf : tabSib;
          const right = cur === 'square'   ? tabSelf : tabSib;
          return `<div class="variant-switcher">
            <span class="label">Variant</span>
            ${left}${right}
            <span class="dim" style="font-size:11px;color:var(--muted);margin-left:8px;">
              IG 用方版（square），其他平台用 vertical。同一份 prompt，size 段落不同。
            </span>
          </div>`;
        })()
      : '';

    root.innerHTML = `
      ${variantSwitcher}
      <div class="asset-preview">
        ${m.url ? `<img src="${esc(m.url)}" alt="">` : '<div style="padding:30px;text-align:center;color:var(--muted);">no image</div>'}
        <div style="margin-top:10px;font-size:11px;color:var(--muted);">${esc(m.file_path || '')}</div>
      </div>
      <div>
        <div class="panel">
          <h3>Asset metadata</h3>
          <table class="meta-table">
            <tr><th>Status</th><td>${enabledPill}</td></tr>
            <tr><th>Game</th><td>${linkGame}</td></tr>
            <tr><th>Metric</th><td>${linkMetric}${m.scope ? ` <span class="pill">${esc(m.scope)}</span>` : ''}</td></tr>
            ${m.entity_label ? `<tr><th>Entity</th><td>${esc(m.entity_label)}</td></tr>` : ''}
            ${m.value_text ? `<tr><th>Value</th><td>${esc(m.value_text)} ${m.rank_text ? `· ${esc(m.rank_text)}` : ''}</td></tr>` : ''}
            <tr><th>Generated at</th><td>${esc(m.created_at_human || m.created_at || '—')}</td></tr>
            <tr><th>Model</th><td>${esc(m.model || 'gpt-image-2')}</td></tr>
            <tr><th>Variant</th><td>${esc(variantLabel(m.variant === 'square' ? 'square' : 'vertical'))}<span class="pill" style="margin-left:6px;">slot=${esc(m.slot || '—')}</span></td></tr>
            <tr><th>Post</th><td>${linkPost}</td></tr>
            ${m.size_kb ? `<tr><th>File size</th><td>${esc(m.size_kb)} KB</td></tr>` : ''}
          </table>
        </div>

        <div class="panel">
          <h3>Prompt</h3>
          <div class="prompt-tabs" style="display:flex;align-items:center;">
            <button class="prompt-tab active" data-prompt-mode="live">Live <span class="pill">re-rendered now</span></button>
            <button class="prompt-tab" data-prompt-mode="original">Original <span class="pill">at generation time</span></button>
            <span id="prompt-diff-hint" class="prompt-diff-hint"></span>
          </div>
          <textarea id="prompt-box" class="prompt-box" readonly>${esc(m.prompt_live || m.prompt || '(prompt unavailable — likely produced before prompt persistence was added)')}</textarea>
          <div class="btn-row">
            <button id="btn-copy" class="btn">Copy prompt</button>
            <span id="status-copy" class="status"></span>
          </div>
        </div>

        <div class="panel" style="border-color: color-mix(in srgb, var(--win) 40%, var(--border));">
          <h3 style="color: var(--win);">✓ Recommended: Replace with your own ChatGPT output (free)</h3>
          <div style="font-size:12.5px;color:var(--text);line-height:1.6;margin-bottom:10px;">
            If you have a <b>ChatGPT Plus / Team / Enterprise</b> subscription, this path is free for Funba:
            <ol style="margin:6px 0 0 18px;padding:0;color:var(--muted);">
              <li>Click <b>Copy prompt</b> above.</li>
              <li>Paste into ChatGPT (it'll generate the image for you under your existing subscription).</li>
              <li>Download the result.</li>
              <li>Upload it here — replaces the current image in place; home feed picks it up immediately.</li>
            </ol>
          </div>
          <input id="replace-input" class="file-input" type="file" accept="image/png,image/jpeg,image/webp">
          <div class="btn-row">
            <button id="btn-replace" class="btn">Upload + replace</button>
            <span id="status-replace" class="status"></span>
          </div>
        </div>

        <div class="panel">
          <h3 style="color: var(--muted);">Regenerate via gpt-image-2 API (costs money)</h3>
          <div style="font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.55;">
            Fallback: re-call the gpt-image-2 API with the prompt above and overwrite this asset.
            Costs <b>~$0.10 per call</b> against Funba's OpenAI bill, so prefer the ChatGPT route above
            whenever you have a subscription handy.
          </div>
          <div class="btn-row">
            <button id="btn-regen" class="btn btn-warn">Regenerate (charges API)</button>
            <span id="status-regen" class="status"></span>
          </div>
        </div>
      </div>
    `;

    // Prompt tab toggle (Live vs Original).
    const promptLive = m.prompt_live || '';
    const promptOriginal = m.prompt_original || '';
    const promptBox = document.getElementById('prompt-box');
    const diffHint = document.getElementById('prompt-diff-hint');
    if (promptLive && promptOriginal && promptLive !== promptOriginal) {
      diffHint.textContent = '⚠ live differs from original';
      diffHint.classList.add('differs');
    } else if (promptLive && !promptOriginal) {
      diffHint.textContent = 'no original on file';
    } else if (!promptLive && promptOriginal) {
      diffHint.textContent = 'live re-render unavailable';
    } else {
      diffHint.textContent = '';
    }
    document.querySelectorAll('.prompt-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.prompt-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const mode = tab.getAttribute('data-prompt-mode');
        promptBox.value = (mode === 'original' ? promptOriginal : promptLive)
          || '(unavailable)';
      });
    });

    document.getElementById('btn-copy').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(promptBox.value || '');
        setStatus('status-copy', 'Copied to clipboard', 'ok');
      } catch (e) {
        setStatus('status-copy', 'Copy failed: ' + e.message, 'err');
      }
    });

    document.getElementById('btn-replace').addEventListener('click', async () => {
      const input = document.getElementById('replace-input');
      if (!input.files || !input.files[0]) {
        setStatus('status-replace', 'Pick a file first', 'err');
        return;
      }
      setStatus('status-replace', 'Uploading…');
      try {
        const fd = new FormData();
        fd.append('file', input.files[0]);
        const res = await fetch(`/api/admin/assets/${ASSET_ID}/replace`, { method: 'POST', body: fd });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'failed');
        setStatus('status-replace', 'Replaced — refresh to see the new image', 'ok');
      } catch (e) {
        setStatus('status-replace', 'Failed: ' + e.message, 'err');
      }
    });

    document.getElementById('btn-regen').addEventListener('click', async () => {
      if (!confirm('Re-call gpt-image-2 with the same prompt? This costs ~$0.10.')) return;
      setStatus('status-regen', 'Generating (may take ~2 min)…');
      try {
        const res = await fetch(`/api/admin/assets/${ASSET_ID}/regenerate`, { method: 'POST' });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'failed');
        setStatus('status-regen', 'Done — refresh to see new version', 'ok');
      } catch (e) {
        setStatus('status-regen', 'Failed: ' + e.message, 'err');
      }
    });
  }

  fetch(`/api/admin/assets/${ASSET_ID}`).then(r => r.json()).then(data => {
    if (!data.ok) throw new Error(data.error || 'load failed');
    render(data);
  }).catch(e => {
    root.innerHTML = `<div style="color:var(--loss);">${esc(e.message)}</div>`;
  });
})();
</script>
{% endblock %}
