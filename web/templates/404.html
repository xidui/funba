{% extends "base.html" %}
{% block title %}404 — {{ site_name }}{% endblock %}
{% block content %}
<div class="card" style="max-width:520px;margin:60px auto;text-align:center;padding:48px 32px;">
  <div style="font-family:'Outfit',sans-serif;font-size:4rem;font-weight:800;color:var(--muted);line-height:1;margin-bottom:12px;">404</div>
  <h1 style="font-size:1.5rem;margin-bottom:12px;">Page Not Found</h1>
  <p class="meta" style="margin-bottom:28px;">The page you're looking for doesn't exist or has been moved.</p>
  <a href="{{ url_for('home') }}" style="padding:8px 20px;border-radius:8px;background:var(--surface-2);border:1px solid var(--border-2);color:var(--text);font-size:13px;font-weight:600;text-decoration:none;">Back to Home</a>
</div>
{% endblock %}
