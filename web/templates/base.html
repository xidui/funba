<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "NBA Browser" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #eef3f6;
        --bg-deep: #dde7ee;
        --card: rgba(255, 255, 255, 0.88);
        --card-strong: #ffffff;
        --ink: #162433;
        --muted: #5e7082;
        --line: #d4dde5;
        --accent: #0e7abf;
        --accent-2: #169c7f;
        --warm: #e7b063;
        --ring: rgba(14, 122, 191, 0.25);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Plus Jakarta Sans", "Trebuchet MS", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(1200px 600px at 95% -10%, rgba(22, 156, 127, 0.14), transparent 50%),
          radial-gradient(900px 500px at 10% -20%, rgba(14, 122, 191, 0.16), transparent 45%),
          linear-gradient(180deg, var(--bg), var(--bg-deep));
        min-height: 100vh;
      }

      .container {
        max-width: 1240px;
        margin: 0 auto;
        padding: 22px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
        padding: 14px 18px;
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 16px;
        background: rgba(22, 36, 51, 0.9);
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 28px rgba(6, 24, 38, 0.18);
      }

      .brand {
        color: #fff;
        text-decoration: none;
        display: inline-flex;
        align-items: baseline;
        gap: 10px;
      }

      .brand-mark {
        font-family: "Outfit", "Trebuchet MS", sans-serif;
        font-size: 11px;
        letter-spacing: 0.16em;
        font-weight: 700;
        color: #9dd5ff;
        text-transform: uppercase;
      }

      .brand-text {
        font-family: "Outfit", "Trebuchet MS", sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: #ffffff;
      }

      .nav {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .nav a {
        color: #d9e8f6;
        font-weight: 600;
        font-size: 14px;
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        text-decoration: none;
      }

      .nav a:hover {
        color: #fff;
        border-color: rgba(255, 255, 255, 0.34);
        background: rgba(255, 255, 255, 0.12);
        text-decoration: none;
      }

      .card {
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 18px;
        padding: 18px;
        margin-bottom: 18px;
        box-shadow: 0 10px 26px rgba(9, 38, 58, 0.08);
        backdrop-filter: blur(6px);
        animation: riseIn 380ms ease-out both;
      }

      h1,
      h2,
      h3 {
        margin: 0 0 12px;
        font-family: "Outfit", "Trebuchet MS", sans-serif;
        letter-spacing: 0.01em;
      }

      h1 {
        font-size: clamp(1.7rem, 2.2vw, 2.2rem);
      }

      h2 {
        font-size: clamp(1.2rem, 1.6vw, 1.45rem);
      }

      h3 {
        font-size: clamp(1rem, 1.2vw, 1.12rem);
        margin-top: 14px;
      }

      p {
        margin: 9px 0;
      }

      a {
        color: var(--accent);
        font-weight: 600;
        text-decoration: none;
        text-decoration-thickness: 2px;
        text-underline-offset: 2px;
      }

      a:hover {
        text-decoration: underline;
      }

      .grid-2 {
        display: grid;
        gap: 18px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .hero-card {
        position: relative;
        overflow: hidden;
        background:
          linear-gradient(125deg, rgba(255, 255, 255, 0.92), rgba(233, 245, 252, 0.88)),
          var(--card-strong);
      }

      .hero-card::after {
        content: "";
        position: absolute;
        right: -120px;
        top: -120px;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        background: radial-gradient(circle at center, rgba(22, 156, 127, 0.18), transparent 68%);
        pointer-events: none;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 11px;
        border-radius: 999px;
        background: rgba(14, 122, 191, 0.09);
        border: 1px solid rgba(14, 122, 191, 0.2);
        color: #1b3d59;
        font-size: 13px;
        font-weight: 600;
      }

      .chip-muted {
        background: rgba(26, 156, 127, 0.08);
        border-color: rgba(26, 156, 127, 0.22);
        color: #1f5a4d;
      }

      .control-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      label {
        color: var(--muted);
        font-weight: 600;
        font-size: 13px;
      }

      select {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 11px;
        font-size: 14px;
        color: var(--ink);
        background: #fff;
        min-width: 180px;
      }

      select:focus {
        outline: 2px solid var(--ring);
        border-color: var(--accent);
      }

      .table-wrap {
        overflow: auto;
        border: 1px solid #dbe2e9;
        border-radius: 12px;
        background: #fff;
      }

      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        font-size: 13px;
        min-width: 640px;
      }

      th,
      td {
        text-align: left;
        padding: 10px 10px;
        border-bottom: 1px solid #ebeff3;
      }

      th {
        position: sticky;
        top: 0;
        background: #f5f9fc;
        color: #4f6477;
        font-weight: 600;
        z-index: 1;
      }

      tbody tr:nth-child(even) td {
        background: #fbfdff;
      }

      tbody tr:hover td {
        background: #f1f8ff;
      }

      .meta {
        color: var(--muted);
        font-size: 13px;
      }

      .nowrap {
        white-space: nowrap;
      }

      .list {
        margin: 0;
        padding-left: 18px;
      }

      .entity-list {
        margin: 0;
        padding: 0;
        list-style: none;
        columns: 2;
        column-gap: 18px;
      }

      .entity-list li {
        break-inside: avoid;
        margin-bottom: 6px;
      }

      .pbp-table thead th {
        position: sticky;
        top: 0;
        background: #fff;
        z-index: 2;
      }

      .shot-toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }

      .shot-filter {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-right: 4px;
        font-size: 13px;
      }

      .shot-court {
        width: 100%;
        height: 640px;
        max-width: 700px;
        border: 1px solid #d8dde3;
        border-radius: 12px;
        background: #fbfbfb;
      }

      .shot-dot {
        cursor: pointer;
        transition: opacity 120ms ease;
      }

      .shot-dot:hover {
        opacity: 1;
        stroke-width: 1.5;
      }

      #shot-tooltip {
        position: fixed;
        display: none;
        pointer-events: none;
        background: #1d2a36;
        color: #fff;
        font-size: 12px;
        line-height: 1.35;
        padding: 8px 10px;
        border-radius: 8px;
        z-index: 60;
        max-width: 240px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
      }

      @keyframes riseIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card:nth-of-type(1) { animation-delay: 10ms; }
      .card:nth-of-type(2) { animation-delay: 40ms; }
      .card:nth-of-type(3) { animation-delay: 75ms; }
      .card:nth-of-type(4) { animation-delay: 110ms; }
      .card:nth-of-type(5) { animation-delay: 145ms; }

      @media (max-width: 860px) {
        .container {
          padding: 14px;
        }

        .topbar {
          padding: 12px 14px;
          border-radius: 14px;
        }

        .brand-text {
          font-size: 17px;
        }

        .grid-2 {
          grid-template-columns: 1fr;
        }

        .entity-list {
          columns: 1;
        }

        .card {
          padding: 14px;
          border-radius: 14px;
        }

        .shot-court {
          height: 500px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="topbar">
        <a class="brand" href="{{ url_for('home') }}">
          <span class="brand-mark">FUNBA</span>
          <span class="brand-text">Courtside Studio</span>
        </a>
        <div class="nav">
          <a href="{{ url_for('home') }}">Home</a>
        </div>
      </header>
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
