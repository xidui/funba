<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "FUNBA" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Design tokens ─────────────────────────────────────────── */
      :root {
        --bg:         #080f1a;
        --surface:    #0d1c2e;
        --surface-2:  #132438;
        --surface-3:  #1a2f47;
        --border:     rgba(100, 170, 240, 0.09);
        --border-2:   rgba(100, 170, 240, 0.18);
        --text:       #ccd8e8;
        --muted:      #4e6880;
        --muted-2:    #7a9ab8;
        --accent:     #f97316;
        --accent-dim: rgba(249, 115, 22, 0.12);
        --win:        #4ade80;
        --loss:       #f87171;
        --win-bg:     rgba(74, 222, 128, 0.1);
        --loss-bg:    rgba(248, 113, 113, 0.1);
        --ring:       rgba(249, 115, 22, 0.35);
      }

      /* ── Reset ─────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 14px;
        line-height: 1.55;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* ── Topbar ─────────────────────────────────────────────────── */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(8, 15, 26, 0.96);
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }

      .topbar-inner {
        max-width: 1300px;
        margin: 0 auto;
        padding: 0 22px;
        height: 54px;
        display: flex;
        align-items: center;
        gap: 14px;
      }

      /* Brand */
      .brand {
        display: flex;
        align-items: center;
        gap: 9px;
        text-decoration: none;
        flex-shrink: 0;
      }

      .brand-ball {
        width: 30px;
        height: 30px;
        background: var(--accent);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Outfit', sans-serif;
        font-weight: 800;
        font-size: 13px;
        color: #fff;
        letter-spacing: -0.02em;
        box-shadow: 0 0 14px rgba(249, 115, 22, 0.4);
      }

      .brand-name {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 17px;
        color: #fff;
        letter-spacing: 0.01em;
      }

      /* Global search */
      .gs-wrap {
        flex: 1;
        max-width: 380px;
        position: relative;
      }

      .gs-input {
        width: 100%;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 7px 12px 7px 34px;
        font-size: 13px;
        font-family: inherit;
        color: var(--text);
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      .gs-input::placeholder { color: var(--muted); }

      .gs-input:focus {
        border-color: rgba(249, 115, 22, 0.5);
        box-shadow: 0 0 0 3px var(--ring);
      }

      .gs-icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        pointer-events: none;
      }

      .gs-dropdown {
        display: none;
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        background: var(--surface-2);
        border: 1px solid var(--border-2);
        border-radius: 10px;
        overflow: hidden;
        z-index: 200;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6);
      }

      .gs-dropdown.open { display: block; }

      .gs-item {
        padding: 10px 14px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        transition: background 0.1s;
      }

      .gs-item:hover, .gs-item.focused { background: var(--surface-3); }

      /* Nav */
      .topbar-nav {
        display: flex;
        align-items: center;
        gap: 2px;
        margin-left: auto;
        flex-shrink: 0;
      }

      .nav-link {
        color: var(--muted-2);
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        padding: 6px 10px;
        border-radius: 6px;
        transition: color 0.15s, background 0.15s;
      }

      .nav-link:hover, .nav-link.active {
        color: var(--text);
        background: var(--surface-2);
        text-decoration: none;
      }
      .nav-link.active { color: var(--accent); }

      /* ── Layout ─────────────────────────────────────────────────── */
      .container {
        max-width: 1300px;
        margin: 0 auto;
        padding: 24px 22px;
      }

      /* ── Cards ──────────────────────────────────────────────────── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 22px;
        margin-bottom: 18px;
        animation: fadeUp 0.22s ease-out both;
      }

      .card:nth-of-type(2) { animation-delay: 40ms; }
      .card:nth-of-type(3) { animation-delay: 75ms; }
      .card:nth-of-type(4) { animation-delay: 110ms; }
      .card:nth-of-type(5) { animation-delay: 145ms; }

      /* ── Typography ─────────────────────────────────────────────── */
      h1 {
        font-family: 'Outfit', sans-serif;
        font-size: clamp(1.6rem, 2.4vw, 2.1rem);
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.02em;
        line-height: 1.15;
        margin-bottom: 6px;
      }

      h2 {
        font-family: 'Outfit', sans-serif;
        font-size: clamp(1.05rem, 1.5vw, 1.2rem);
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.01em;
        margin-bottom: 14px;
      }

      h3 {
        font-family: 'Outfit', sans-serif;
        font-size: 11px;
        font-weight: 700;
        color: var(--muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 10px;
        margin-top: 20px;
      }

      .meta {
        color: var(--muted);
        font-size: 13px;
      }

      a { color: var(--accent); text-decoration: none; font-weight: 500; }
      a:hover { text-decoration: underline; text-decoration-thickness: 1px; }

      /* ── Tables ─────────────────────────────────────────────────── */
      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--border);
        border-radius: 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        min-width: 500px;
      }

      thead th {
        background: var(--surface-2);
        color: var(--muted-2);
        font-weight: 600;
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        padding: 9px 12px;
        text-align: left;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
        position: sticky;
        top: 0;
        z-index: 1;
      }

      tbody td {
        padding: 9px 12px;
        border-bottom: 1px solid var(--border);
        color: var(--text);
      }

      tbody tr:last-child td { border-bottom: none; }

      tbody tr:hover td { background: rgba(100, 170, 240, 0.05); }

      /* W/L row tints */
      tr.row-win td  { background: rgba(74, 222, 128, 0.05); }
      tr.row-loss td { background: rgba(248, 113, 113, 0.05); }
      tr.row-win:hover td  { background: rgba(74, 222, 128, 0.09); }
      tr.row-loss:hover td { background: rgba(248, 113, 113, 0.09); }

      /* Overall row */
      tr.row-overall td {
        background: var(--surface-2);
        font-weight: 600;
        border-bottom: 2px solid var(--border-2);
      }

      tr.row-overall:hover td { background: var(--surface-3); }

      /* ── Badges ─────────────────────────────────────────────────── */
      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 2px 9px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        white-space: nowrap;
      }

      .badge-win  { background: var(--win-bg);  color: var(--win);  }
      .badge-loss { background: var(--loss-bg); color: var(--loss); }
      .badge-neutral { background: var(--surface-2); color: var(--muted-2); }

      /* ── Tabs ───────────────────────────────────────────────────── */
      .tab-bar {
        display: flex;
        gap: 3px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 3px;
        width: fit-content;
        margin-bottom: 16px;
      }

      .tab-btn {
        padding: 5px 14px;
        border-radius: 6px;
        font-size: 12.5px;
        font-weight: 600;
        color: var(--muted-2);
        text-decoration: none;
        cursor: pointer;
        border: none;
        background: transparent;
        font-family: inherit;
        transition: color 0.12s, background 0.12s;
      }

      .tab-btn:hover { color: var(--text); text-decoration: none; }

      .tab-btn.active {
        background: var(--surface-3);
        color: #fff;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
      }

      /* ── Stat chips ─────────────────────────────────────────────── */
      .stat-chips {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin: 12px 0 4px;
      }

      .stat-chip {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 18px;
        text-align: center;
        min-width: 70px;
      }

      .stat-chip-val {
        font-family: 'Outfit', sans-serif;
        font-size: 1.55rem;
        font-weight: 700;
        color: #fff;
        line-height: 1.1;
        display: block;
      }

      .stat-chip-lbl {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
        margin-top: 3px;
        display: block;
      }

      /* ── Form controls ──────────────────────────────────────────── */
      .control-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }

      select {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 6px 10px;
        font-size: 13px;
        font-family: inherit;
        color: var(--text);
        cursor: pointer;
        min-width: 160px;
        outline: none;
        transition: border-color 0.15s;
      }

      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px var(--ring);
      }

      label { color: var(--muted); font-size: 12px; font-weight: 500; }

      /* ── Shot court SVG ─────────────────────────────────────────── */
      .shot-court, .player-heat-court {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #f4e9d0;
      }

      .shot-court  { height: 540px; max-width: 660px; }
      .player-heat-court { display: block; height: 600px; max-width: 700px; }

      /* ── Tooltip ────────────────────────────────────────────────── */
      #shot-tooltip, #player-heat-tooltip {
        position: fixed;
        display: none;
        pointer-events: none;
        background: #0d1c2e;
        border: 1px solid var(--border-2);
        color: var(--text);
        font-size: 12px;
        line-height: 1.5;
        padding: 9px 12px;
        border-radius: 9px;
        z-index: 300;
        max-width: 230px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
      }

      /* ── Shot dots ──────────────────────────────────────────────── */
      .shot-dot {
        cursor: pointer;
        transition: opacity 100ms ease;
      }

      .shot-dot:hover { opacity: 1 !important; stroke-width: 1.5; }

      /* ── Heatmap zone ───────────────────────────────────────────── */
      .player-heat-zone {
        cursor: pointer;
        transition: opacity 100ms ease, stroke-width 100ms ease;
      }

      .player-heat-zone:hover { stroke-width: 2.5; }

      /* ── Grids ──────────────────────────────────────────────────── */
      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 18px;
      }

      /* ── Misc ───────────────────────────────────────────────────── */
      .nowrap { white-space: nowrap; }
      .hidden { display: none !important; }
      hr.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

      /* +/- coloring */
      .pm-pos { color: var(--win); font-weight: 600; }
      .pm-neg { color: var(--loss); }

      /* ── Animations ─────────────────────────────────────────────── */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(5px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Responsive ─────────────────────────────────────────────── */
      @media (max-width: 860px) {
        .container { padding: 16px 14px; }
        .topbar-inner { padding: 0 14px; }
        .grid-2 { grid-template-columns: 1fr; }
        .brand-name { display: none; }
        .shot-court  { height: 420px; }
        .player-heat-court { height: 480px; }
      }

      @media (max-width: 540px) {
        .gs-wrap { max-width: none; }
      }

      /* ── Shared section / metric cards ──────────────────────────── */
      .section { margin-top: 32px; }
      .section-title {
        font-family: 'Outfit', sans-serif;
        font-size: 15px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
        margin-bottom: 14px;
      }
      .metrics-sub-title {
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--muted);
        margin: 0 0 10px;
      }
      .metrics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 12px;
      }
      .metric-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        transition: border-color 0.15s, background 0.15s;
        cursor: pointer;
      }
      .metric-card:hover {
        border-color: var(--accent);
        background: var(--surface-2);
      }
      .metric-card.metric-notable {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent) 8%, var(--surface));
      }
      .metric-card.metric-notable:hover {
        background: color-mix(in srgb, var(--accent) 14%, var(--surface));
      }
      .metric-key {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }
      .metric-notable .metric-key { color: var(--accent); }
      .metric-value {
        font-family: 'Outfit', sans-serif;
        font-size: 22px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.1;
      }
      .metric-context-label {
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
        font-variant-numeric: tabular-nums;
      }
      .metric-reason {
        font-size: 12px;
        color: var(--muted-2);
        margin-top: 4px;
        line-height: 1.4;
      }
      .metric-score {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a href="{{ url_for('home') }}" class="brand">
          <div class="brand-ball">F</div>
          <span class="brand-name">FUNBA</span>
        </a>

        <div class="gs-wrap">
          <svg class="gs-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
          <input
            id="gs-input"
            class="gs-input"
            type="search"
            placeholder="Search players…"
            autocomplete="off"
            spellcheck="false"
            aria-label="Search players"
          />
          <div id="gs-dropdown" class="gs-dropdown" role="listbox"></div>
        </div>

        <nav class="topbar-nav">
          <a href="{{ url_for('home') }}" class="nav-link {{ 'active' if request.endpoint == 'home' }}">Home</a>
          <a href="{{ url_for('games_list') }}" class="nav-link {{ 'active' if request.endpoint == 'games_list' }}">Games</a>
          <a href="{{ url_for('metrics_browse') }}" class="nav-link {{ 'active' if request.endpoint == 'metrics_browse' }}">Metrics</a>
        </nav>
      </div>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <script>
      (function () {
        const input    = document.getElementById('gs-input');
        const dropdown = document.getElementById('gs-dropdown');
        if (!input || !dropdown) return;

        const profileBase = "{{ url_for('player_page', player_id='__PID__') }}";
        const hintsUrl    = "{{ url_for('player_hints_api') }}";

        let timer      = null;
        let controller = null;
        let focusIdx   = -1;
        let items      = [];

        function go(pid) {
          window.location.href = profileBase.replace('__PID__', pid);
        }

        function render(newItems) {
          items    = newItems;
          focusIdx = -1;
          dropdown.innerHTML = '';
          if (!items.length) { dropdown.classList.remove('open'); return; }
          items.forEach((p, i) => {
            const el = document.createElement('div');
            el.className = 'gs-item';
            el.setAttribute('role', 'option');
            el.textContent = p.full_name;
            el.addEventListener('mousedown', e => { e.preventDefault(); go(p.player_id); });
            dropdown.appendChild(el);
          });
          dropdown.classList.add('open');
        }

        function moveFocus(delta) {
          const els = dropdown.querySelectorAll('.gs-item');
          if (!els.length) return;
          els[focusIdx]?.classList.remove('focused');
          focusIdx = Math.max(0, Math.min(focusIdx + delta, els.length - 1));
          els[focusIdx].classList.add('focused');
        }

        async function load(q) {
          if (controller) controller.abort();
          controller = new AbortController();
          const url  = new URL(hintsUrl, location.origin);
          url.searchParams.set('q', q);
          url.searchParams.set('limit', '10');
          try {
            const r = await fetch(url, { signal: controller.signal });
            if (!r.ok) return;
            const d = await r.json();
            render(d.items || []);
          } catch (_) {}
        }

        input.addEventListener('input', () => {
          clearTimeout(timer);
          const q = input.value.trim();
          if (!q) { dropdown.classList.remove('open'); return; }
          timer = setTimeout(() => load(q), 160);
        });

        input.addEventListener('keydown', e => {
          if (e.key === 'ArrowDown')  { e.preventDefault(); moveFocus(+1); }
          else if (e.key === 'ArrowUp')   { e.preventDefault(); moveFocus(-1); }
          else if (e.key === 'Enter') {
            e.preventDefault();
            if (focusIdx >= 0 && items[focusIdx]) go(items[focusIdx].player_id);
            else if (items.length === 1)           go(items[0].player_id);
          }
          else if (e.key === 'Escape') { dropdown.classList.remove('open'); input.blur(); }
        });

        input.addEventListener('focus', () => {
          if (input.value.trim()) load(input.value.trim());
        });

        document.addEventListener('click', e => {
          if (!input.contains(e.target) && !dropdown.contains(e.target))
            dropdown.classList.remove('open');
        });
      })();
    </script>
  </body>
</html>
