<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "NBA Browser" }}</title>
    <style>
      :root {
        --bg: #f6f4ef;
        --card: #ffffff;
        --ink: #1d2a36;
        --muted: #60717f;
        --line: #d8dde3;
        --accent: #0c6ba3;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at top right, #e5f2fb, var(--bg) 50%);
      }

      .container {
        max-width: 1120px;
        margin: 0 auto;
        padding: 20px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }

      h1,
      h2,
      h3 {
        margin: 0 0 12px;
      }

      p {
        margin: 8px 0;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .nav {
        display: flex;
        gap: 16px;
        margin-bottom: 20px;
        font-weight: 600;
      }

      .grid-2 {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      th,
      td {
        text-align: left;
        padding: 10px 8px;
        border-bottom: 1px solid var(--line);
      }

      th {
        color: var(--muted);
        font-weight: 600;
      }

      .meta {
        color: var(--muted);
      }

      .nowrap {
        white-space: nowrap;
      }

      .list {
        margin: 0;
        padding-left: 18px;
      }

      @media (max-width: 860px) {
        .grid-2 {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="nav">
        <a href="{{ url_for('home') }}">Home</a>
      </div>
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
