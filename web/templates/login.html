{% extends "base.html" %}
{% block content %}
<style>
  .login-container {
    max-width: 400px;
    margin: 60px auto;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px 32px;
  }
  .login-title {
    font-family: 'Outfit', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
  }
  .login-subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
  }
  .login-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: var(--muted);
    font-size: 13px;
  }
  .login-divider::before,
  .login-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .login-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: filter 0.15s;
    text-decoration: none;
  }
  .login-btn:hover { filter: brightness(1.1); }
  .login-btn-google {
    background: #fff;
    color: #333;
    border: 1px solid #ddd;
  }
  .login-btn-email {
    background: var(--accent);
    color: #fff;
    border: none;
  }
  .login-email-input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: #fff;
    font-size: 14px;
    margin-bottom: 12px;
    box-sizing: border-box;
  }
  .login-email-input::placeholder { color: var(--muted); }
  .login-email-input:focus {
    outline: none;
    border-color: var(--accent);
  }
</style>

<div class="login-container">
  <div class="login-card">
    <div class="login-title">Sign in to Funba</div>
    <div class="login-subtitle">Choose your preferred sign-in method</div>

    <a href="{{ url_for('auth_google', next=next_url) }}" class="login-btn login-btn-google">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 010-9.18l-7.98-6.19a24.01 24.01 0 000 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </a>

    <div class="login-divider">or</div>

    <form method="post" action="{{ url_for('auth_magic_send') }}">
      <input type="hidden" name="next" value="{{ next_url }}">
      <input type="email" name="email" class="login-email-input" placeholder="Enter your email" required>
      <button type="submit" class="login-btn login-btn-email">Send login link</button>
    </form>
  </div>
</div>
{% endblock %}
